<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Bulk Image Captioner Smart Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-lg border border-gray-100">
        <h1 class="text-3xl font-extrabold text-center text-indigo-600 mb-2">📦 Gemini Bulk Image Captioner (Smart Fallback)</h1>
        <p class="text-center text-gray-500 text-sm mb-8">Automatically switches models (2.5 Flash ➔ 2.0 Flash Exp ➔ 1.5 Flash) if rate limits are hit.</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Gemini API Key</label>
                    <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Upload ZIP File (Images Only)</label>
                    <input type="file" id="zipFile" accept=".zip" class="w-full p-2 border border-gray-300 rounded-lg file:mr-4 file:py-1.5 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-5 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Master Prompt</label>
                <textarea id="masterPrompt" rows="4" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="e.g., Generate a short ecommerce caption for this image."></textarea>
            </div>
        </div>

        <div class="text-center mb-8 bg-gray-50 p-4 rounded-xl border border-gray-200">
            <button id="startBtn" onclick="processZip()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-10 rounded-lg shadow-md transition duration-200 disabled:bg-gray-400 cursor-pointer disabled:cursor-not-allowed">
                Start Bulk Captioning
            </button>
            <div id="status" class="mt-4 text-base font-medium text-gray-700 min-h-[24px]">Ready to process...</div>
        </div>

        <div class="border-t border-gray-200 pt-6">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center space-x-2">
                    <span class="text-xl font-bold text-gray-800">📋 Output Terminal</span>
                    <span class="text-xs bg-green-100 text-green-800 font-semibold px-2 py-0.5 rounded">Format: Sheets Ready (TSV)</span>
                </div>
                <button onclick="copyToClipboard()" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 py-1.5 px-4 rounded-md transition font-semibold cursor-pointer">
                    Copy All Results
                </button>
            </div>
            <textarea id="outputArea" rows="14" readonly class="w-full p-4 bg-gray-900 text-green-400 font-mono text-sm rounded-lg border border-gray-800 shadow-inner leading-relaxed focus:outline-none" placeholder="Results will appear here in Tab-Separated format..."></textarea>
        </div>
    </div>

    <script type="module">
        import { GoogleGenAI } from 'https://esm.run/@google/genai';

        const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function runCountdown(seconds, messageElement, filename, reason) {
            for (let i = seconds; i > 0; i--) {
                messageElement.innerHTML = `⚠️ <span class="text-amber-600 font-semibold">${reason}.</span> Retrying <span class="font-bold">${filename}</span> in <span class="text-indigo-600 font-bold">${i}s</span>...`;
                await delay(1000);
            }
        }

        window.processZip = async function() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const zipFileInput = document.getElementById('zipFile').files[0];
            const masterPrompt = document.getElementById('masterPrompt').value.trim();
            const statusDiv = document.getElementById('status');
            const outputArea = document.getElementById('outputArea');
            const startBtn = document.getElementById('startBtn');

            if (!apiKey) return alert('Please enter your Gemini API Key!');
            if (!zipFileInput) return alert('Please upload a ZIP file!');
            if (!masterPrompt) return alert('Please enter a Master Prompt!');

            startBtn.disabled = true;
            outputArea.value = "";
            statusDiv.className = "mt-4 text-base font-medium text-gray-700";
            statusDiv.innerText = "Extracting ZIP folder content...";

            // Updated verified production models list
            const modelsList = ['gemini-2.5-flash', 'gemini-2.0-flash-exp', 'gemini-1.5-flash'];
            let currentModelIndex = 0; 

            try {
                const ai = new GoogleGenAI({ apiKey: apiKey });
                const zip = await JSZip.loadAsync(zipFileInput);
                
                const imageFiles = Object.keys(zip.files).filter(filename => {
                    return !zip.files[filename].dir && /\.(jfif|pjpeg|jpeg|pjpg|png|jpg|webp)$/i.test(filename);
                }).sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));

                if (imageFiles.length === 0) {
                    throw new Error("No supported images (.jpg, .png, .webp) found inside the uploaded ZIP.");
                }

                // Main Sequential Loop
                for (let i = 0; i < imageFiles.length; i++) {
                    const filename = imageFiles[i];
                    let fileData = await zip.files[filename].async("base64");
                    const ext = filename.split('.').pop().toLowerCase();
                    const mimeType = ext === 'png' ? 'image/png' : ext === 'webp' ? 'image/webp' : 'image/jpeg';

                    const imagePart = { inlineData: { data: fileData, mimeType: mimeType } };

                    let success = false;
                    let attemptsOnCurrentModel = 0;
                    const maxAttemptsPerModel = 3; 
                    let caption = "";

                    // Request loop for current image
                    while (!success) {
                        let activeModel = modelsList[currentModelIndex];
                        statusDiv.innerHTML = `⚙️ Processing <span class="text-indigo-600 font-bold">${i + 1}/${imageFiles.length}</span>: <span class="font-semibold text-gray-900">${filename}</span> using <span class="text-purple-600 font-bold">${activeModel}</span>`;

                        try {
                            attemptsOnCurrentModel++;
                            
                            const response = await ai.models.generateContent({
                                model: activeModel,
                                contents: [masterPrompt, imagePart],
                            });

                            if (response && response.text) {
                                caption = response.text.trim().replace(/\r?\n|\r/g, " ");
                                success = true; 
                            } else {
                                throw new Error("Empty response");
                            }

                        } catch (error) {
                            console.error(`Error with ${activeModel} on ${filename}:`, error);
                            const errorStr = error.toString().toLowerCase();
                            
                            // Check for Rate Limits/Quota exhaustion or standard 429
                            const isRateLimit = errorStr.includes("429") || errorStr.includes("quota") || errorStr.includes("limit") || errorStr.includes("exhausted");
                            
                            if (isRateLimit && currentModelIndex < modelsList.length - 1) {
                                currentModelIndex++;
                                let nextModel = modelsList[currentModelIndex];
                                statusDiv.innerHTML = `🔄 <span class="text-amber-600 font-bold">Limit Hit on ${activeModel}!</span> Shifting to <b>${nextModel}</b>...`;
                                attemptsOnCurrentModel = 0; 
                                await delay(2000); 
                            } else {
                                if (attemptsOnCurrentModel < maxAttemptsPerModel) {
                                    await runCountdown(5, statusDiv, filename, `Server Busy/Error`);
                                } else {
                                    if (currentModelIndex < modelsList.length - 1) {
                                        currentModelIndex++;
                                        attemptsOnCurrentModel = 0;
                                        statusDiv.innerHTML = `⚠️ Multi-error on ${activeModel}. Shifting to <b>${modelsList[currentModelIndex]}</b>...`;
                                        await delay(2000);
                                    } else {
                                        caption = `[ERROR: All fallback models exhausted. Last error: ${error.message || "API Error"}]`;
                                        success = true;
                                    }
                                }
                            }
                        }
                    }

                    // Save Result
                    outputArea.value += `${filename}\t${caption}\n`;
                    outputArea.scrollTop = outputArea.scrollHeight;
                    
                    // Safe spacing delay between image batches
                    if (i < imageFiles.length - 1) {
                        await delay(1200);
                    }
                }

                statusDiv.innerHTML = "✅ <span class='text-green-600 font-bold'>Task Completed! All images successfully processed.</span>";
                statusDiv.className = "mt-4 text-base font-medium p-2 bg-green-50 rounded-lg text-center border border-green-200";

            } catch (error) {
                console.error("Fatal Error:", error);
                statusDiv.innerHTML = `❌ <span class='text-red-600 font-bold'>Fatal Error: ${error.message}</span>`;
                statusDiv.className = "mt-4 text-base font-medium p-2 bg-red-50 rounded-lg text-center border border-red-200";
            } finally {
                startBtn.disabled = false;
            }
        }

        window.copyToClipboard = function() {
            const outputArea = document.getElementById('outputArea');
            if(!outputArea.value) return alert("Output area is empty!");
            outputArea.select();
            document.execCommand('copy');
            alert('Copied successfully! Paste directly into Google Sheets.');
        }
    </script>
</body>
</html>
